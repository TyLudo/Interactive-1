<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Still Life</title>
    <style>
        main {
            border: 0px solid #000;
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        .wall{
            position: absolute;
            height: 65%;
            width: 100vw;
            top: 0;
            background: linear-gradient(0deg, #0e1901, #8ab841);
        }
        .table{
            position: absolute;
            height: 35%;
            width: 100vw;
            bottom: 0;
            background: linear-gradient(180deg, #869d2a, #e2ecd7);
        }
        .bottle {
            width: 160px; height: 100px;
            border-radius: 100px 100px 0 0;
            left: 30%; bottom: 30%;
            position: absolute;
            background: linear-gradient(90deg,rgba(19, 20, 2, 1) 2%, rgba(255, 208, 0, 1) 47%, rgba(28, 7, 1, 1) 79%, rgba(28, 7, 1, 1) 99%);
        }
        .bottle .bottle {
            width: 160px; height: 100px;
            border-radius: 100px 100px 0 0;
            left: 0; bottom: 0;
            position: absolute;
            background: linear-gradient(90deg,rgba(19, 20, 2, 1) 2%, rgba(255, 208, 0, 1) 47%, rgba(28, 7, 1, 1) 79%, rgba(28, 7, 1, 1) 99%);
        }
        .bottle .bottlemiddle{
            width: 20px; height: 100px;
            background: linear-gradient(90deg,rgba(19, 20, 2, 1) 2%, rgba(255, 208, 0, 1) 47%, rgba(28, 7, 1, 1) 79%, rgba(28, 7, 1, 1) 99%);
            clip-path: polygon(
                20% 0%,
                80% 0%,
                100% 100%,
                0% 100%
            );
            position: absolute;
            bottom: 90px;
            left: 43%;
        }
        .bottle .bottletop{
            width: 100px; height: 30px;
            background: linear-gradient(90deg,rgba(94, 94, 44, 1) 2%, rgba(0, 0, 0, 1) 3%, rgba(19, 20, 2, 1) 15%, rgba(54, 21, 6, 1) 24%, rgba(168, 137, 0, 1) 56%, rgba(28, 7, 1, 1) 93%, rgba(28, 7, 1, 1) 99%);
            clip-path: polygon(
                0% 0%,
                100% 0%,
                80% 100%,
                20% 100%
            );
            position: absolute;
            bottom: 180px;
            left: 18%;
        }
        .tomato1{
            width: 50px; height: 50px;
            border-radius: 100% 100% 100% 100%;
            left: -10pt; bottom: 160pt;
            position: absolute;
            background: radial-gradient(circle at 35% 35%, #ffffff 6%, #F21307 15%, #7e0101 65%);
        }
        .tomato2{
            width: 50px; height: 50px;
            border-radius: 100% 100% 100% 100%;
            left: 0pt; bottom: 200pt;
            position: absolute;
            background: radial-gradient(circle at 35% 35%, #ffffff 6%, #F21307 7%, #7e0101 65%);
        }
        .tomato3{
            width: 50px; height: 50px;
            border-radius: 100% 100% 100% 100%;
            left: 10pt; bottom: 90pt;
            position: absolute;
            background: radial-gradient(circle at 35% 35%, #ffffff 6%, #F21307 12%, #7e0101 65%);
        }
        .tomato4{
            width: 50px; height: 50px;
            border-radius: 100% 100% 100% 100%;
            left: -20pt; bottom: 120pt;
            position: absolute;
            background: radial-gradient(circle at 35% 35%, #ffffff 6%, #F21307 9%, #7e0101 65%);
        }
        .tomato5{
            width: 50px; height: 50px;
            border-radius: 100% 100% 100% 100%;
            left: 30pt; bottom: 160pt;
            position: absolute;
            background: radial-gradient(circle at 35% 35%, #ffffff 6%, #F21307 8%, #7e0101 65%);
        }
        .tomato6{
            width: 50px; height: 50px;
            border-radius: 100% 100% 100% 100%;
            left: 70pt; bottom: 160pt;
            position: absolute;
            background: radial-gradient(circle at 35% 35%, #ffffff 6%, #F21307 7%, #7e0101 65%);
        }
        .tomato7{
            width: 50px; height: 50px;
            border-radius: 100% 100% 100% 100%;
            left: 40pt; bottom: 200pt;
            position: absolute;
            background: radial-gradient(circle at 35% 35%, #ffffff 6%, #F21307 15%, #7e0101 65%);
        }
        .tomato8{
            width: 50px; height: 50px;
            border-radius: 100% 100% 100% 100%;
            left: 30pt; bottom: 250pt;
            position: absolute;
            background: radial-gradient(circle at 35% 35%, #ffffff 6%, #F21307 9%, #7e0101 65%);
        }
        .tomato9{
            width: 50px; height: 50px;
            border-radius: 100% 100% 100% 100%;
            left: 70pt; bottom: 90pt;
            position: absolute;
            background: radial-gradient(circle at 35% 35%, #ffffff 6%, #F21307 7%, #7e0101 65%);
        }
        .tomato10{
            width: 50px; height: 50px;
            border-radius: 100% 100% 100% 100%;
            left: 100pt; bottom: 120pt;
            position: absolute;
            background: radial-gradient(circle at 35% 35%, #ffffff 6%, #F21307 10%, #7e0101 65%);
        }
        .tomatosingle{
            width: 50px; height: 50px;
            border-radius: 100% 100% 100% 100%;
            left: 50%; bottom: 30%;
            position: absolute;
            background: radial-gradient(circle at 35% 35%, #ffffff 6%, #F21307 7%, #7e0101 65%);        
        }
        .stem-piece{
            position:absolute;
            width: 6px;
            height: 30px;
            background-color: rgb(1, 42, 1);
            border-radius: 4px;
        }
        .stem{
            position: absolute;
            left: 50%;
            top: 80px;
        }
        .leaf{
            position: absolute;
            width: 80pt;
            height: 80pt;
            bottom: 200pt;
            left: 70pt;
            background: linear-gradient(135deg,rgba(255, 234, 0, 1) 23%, rgba(60, 112, 4, 1) 48%, rgba(99, 0, 0, 1) 79%, rgba(28, 7, 1, 1) 99%);
            clip-path: polygon(50% 0%, 56% 28%, 100% 35%, 63% 41%, 89% 84%, 49% 51%, 20% 90%, 39% 42%, 4% 23%, 41% 30%);
        }
        .branch{
            position: absolute;
            width: 80pt;
            height: 84pt;
            bottom: 137pt;
            left: 90pt;
            background-color: black;
            clip-path: polygon(70% 37%, 73% 6%, 84% 14%, 75% 42%, 51% 61%, 32% 46%, 1% 85%, 0% 70%, 31% 33%, 51% 51%);
        }
    </style>
</head>
<body>
    <div>
    
        <div class="wall"></div>
        <div class="table"></div>
        <div class="bottle">
            <div class="branch"></div>
            <div class="bottlemiddle"></div>
            <div class="bottle"></div>
            <div class="bottletop"></div>
            <div class="tomato1"></div>
            <div class="tomato2"></div>
            <div class="tomato3"></div>
            <div class="tomato4"></div>
            <div class="tomato5"></div>
            <div class="tomato6"></div>
            <div class="tomato7"></div>
            <div class="tomato8"></div>
            <div class="tomato9"></div>
            <div class="tomato10"></div>
            <div class="leaf"></div>
        </div>
        <div class="tomatosingle"></div>
        </div>

    </div>
    
</body>
</html>
